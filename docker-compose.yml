services:
  postgres:
    image: postgres:16-alpine
    container_name: tacdent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tacdent
      POSTGRES_PASSWORD: tacdent_dev
      POSTGRES_DB: tacdent
    ports:
      - "5432:5432"
    volumes:
      - tacdent_pg_data:/var/lib/postgresql/data

volumes:
  tacdent_pg_data:
